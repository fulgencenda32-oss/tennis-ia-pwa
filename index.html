<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#2d9e56">
    <meta name="description" content="Tennis IA — Intelligence Artificielle de Prédictions Tennis">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tennis IA">
    <link rel="manifest" href="/tennis-ia-pwa/manifest.json">
    <link rel="apple-touch-icon" href="/tennis-ia-pwa/icon-192.png">
    <title>Tennis IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0a1628 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Splash screen */
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            background: linear-gradient(135deg, #1a6b3a, #2d9e56);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 12px 40px rgba(45,158,86,0.5);
            letter-spacing: -1px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 12px 40px rgba(45,158,86,0.5); }
            50%       { box-shadow: 0 12px 60px rgba(45,158,86,0.8); }
        }

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .app-tagline {
            font-size: 0.9rem;
            opacity: 0.6;
            text-align: center;
            line-height: 1.5;
        }

        /* Loader */
        .loader {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .loader span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2d9e56;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .loader span:nth-child(2) { animation-delay: 0.15s; }
        .loader span:nth-child(3) { animation-delay: 0.30s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0);    opacity: 0.4; }
            50%       { transform: translateY(-12px); opacity: 1; }
        }

        .redirect-text {
            font-size: 0.8rem;
            opacity: 0.4;
            margin-top: 8px;
        }

        /* Stats en bas */
        .stats {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 24px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4ade80;
        }

        .stat-label {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="splash">
        <div class="app-icon">T·IA</div>
        <div class="app-name">Tennis IA</div>
        <div class="app-tagline">
            Intelligence Artificielle<br>de Prédictions Tennis
        </div>
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="redirect-text">Chargement en cours...</div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value">67.8%</div>
            <div class="stat-label">Vainqueur</div>
        </div>
        <div class="stat">
            <div class="stat-value">70.9%</div>
            <div class="stat-label">Nb Sets</div>
        </div>
        <div class="stat">
            <div class="stat-value">830K+</div>
            <div class="stat-label">Matchs</div>
        </div>
    </div>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/tennis-ia-pwa/service-worker.js');
        }

        // Redirection automatique après 2.5 secondes
        setTimeout(() => {
            window.location.href = 'https://fulgence10-tennis-ia.hf.space';
        }, 2500);
    </script>

</body>
</html>
